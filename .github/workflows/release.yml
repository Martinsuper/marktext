name: Release MarkText

on:
  push:
    # Broad trigger so the validate job can reject malformed v-tags
    # (e.g. `vbad.tag`) instead of them silently not triggering anything.
    tags:
      - 'v*'
  # Manual trigger from the Actions tab. Lets you build installers on demand
  # without cutting a tag. When `publish_release` is left unchecked the run
  # only uploads downloadable artifacts (no GitHub Release is created).
  workflow_dispatch:
    inputs:
      version:
        description: 'Release/tag name, e.g. v0.20.0-test.1 (required only when publishing)'
        type: string
        required: false
      publish_release:
        description: 'Publish a real GitHub Release (unchecked = build artifacts only)'
        type: boolean
        default: false

concurrency:
  # Key on the dispatched version when present so concurrent manual runs for
  # different versions don't serialize behind one another.
  group: release-${{ inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Effective release name: the tag on a tag push, the typed input on dispatch
  # (github.ref_name is just `main` on a workflow_dispatch from a branch).
  RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        # Only enforce a valid name when a release will actually be published.
        # On artifact-only dispatch runs there's no name to validate; the job
        # still succeeds so `build` (needs: validate) isn't skipped.
        if: github.event_name == 'push' || inputs.publish_release
        env:
          # Pass via env (not inline ${{ }}) so a crafted input can't inject shell.
          NAME: ${{ env.RELEASE_NAME }}
        run: |
          # SemVer 2.0.0 with leading "v"
          if ! [[ "$NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$NAME' is not a valid semver (expected vX.Y.Z[-prerelease][+build])"
            exit 1
          fi
          echo "Tag '$NAME' is valid."

  build:
    name: Build (${{ matrix.name }})
    needs: validate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            platform: linux
          - name: windows-x64
            os: windows-latest
            platform: windows
            arch: x64
          - name: windows-arm64
            os: windows-11-arm
            platform: windows
            arch: arm64
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4.3.1

      - name: Enable Git long paths on Windows
        if: matrix.platform == 'windows'
        shell: bash
        run: git config --global core.longpaths true

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

      - name: Install Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Setup pnpm + Node + dependencies
        uses: ./.github/actions/setup
        with:
          node-version: '24.14.1'

      # Cache Electron binary; key on package.json so it busts when Electron version changes.
      - name: Cache Electron binary
        uses: actions/cache@v4.3.0
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ matrix.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            electron-${{ matrix.os }}-

      # Must be set before postinstall runs electron-rebuild
      - name: Set C++20 for MacOS
        if: matrix.platform == 'macos'
        run: |
          echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      # Run the full postinstall: Electron binary download, patch-package,
      # electron-rebuild, and minify-locales.
      - name: Run postinstall
        run: pnpm tsx scripts/postinstall.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: ${{ matrix.platform == 'linux' && '0' || '' }}

      - name: build-linux
        if: matrix.platform == 'linux'
        run: pnpm run build:linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Mac builds are unsigned (no Developer ID); see release notes for the
      # user-side xattr/codesign workaround. Per-arch script: electron-builder's
      # --arm64/--x64 flags are additive over the config's arch list, so
      # electron-builder.yml must not pin mac.target arches for the flag to
      # actually restrict the build to a single arch.
      - name: build-mac
        if: matrix.platform == 'macos'
        run: pnpm run build:mac:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: build-win
        if: matrix.platform == 'windows'
        run: pnpm run build:win:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: marktext-${{ matrix.name }}
          retention-days: 14
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.blockmap
            dist/*.yml
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    # Publish a Release only on a tag push, or on a manual dispatch that opted
    # in. Bare `inputs.publish_release` (a real boolean) — never `== 'true'`,
    # which GitHub coerces to false. Otherwise the run ends after `build` with
    # only artifacts uploaded.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-latest
    # Per-job permissions REPLACE workflow-level ones, so re-declare
    # both: contents:write to publish the release, actions:read for
    # download-artifact's Actions API calls.
    permissions:
      contents: write
      actions: read
    steps:
      # upload-artifact@v4 treats `dist/` as the common-ancestor root and
      # stores files flat inside each artifact (no `dist/` prefix). Downloading
      # with `path: dist` + `merge-multiple` recreates `./dist/<file>` across
      # all platforms.
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        working-directory: dist
        run: |
          # Deterministic ordering so identical inputs always produce identical output
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -printf '%f\n' \
            | LC_ALL=C sort \
            | xargs -I{} sha256sum "{}" > SHA256SUMS.txt
          echo "---"
          cat SHA256SUMS.txt

      - name: Compose release notes body
        env:
          IS_PRERELEASE: ${{ contains(env.RELEASE_NAME, '-') }}
        run: |
          {
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              echo "## ❗ This is a pre-release"
              echo "- May contain bugs and unfinished features."
              echo ""
            fi
            echo "## ⚠️ Note for macOS users"
            echo "Builds are unsigned (no Apple Developer ID). After dragging MarkText into Applications, clear the quarantine flag once:"
            echo '```'
            echo 'xattr -cr /Applications/marktext.app'
            echo '```'
            echo ""
            echo "## Verifying downloads"
            echo "All artifacts are listed with their SHA-256 in \`SHA256SUMS.txt\`. Verify with:"
            echo '```'
            echo 'sha256sum -c SHA256SUMS.txt --ignore-missing'
            echo '```'
          } > release_body.md

      # Immutable-release repos forbid adding assets to an already-published
      # release, and action-gh-release publishes before uploading the assets.
      # Create the release as a draft (assets allowed), then promote it to a
      # published release in the next step.
      - name: Create draft release with assets
        uses: softprops/action-gh-release@v2.6.2
        with:
          draft: true
          # On a manual dispatch there is no tag ref, so name the tag explicitly
          # and tell the action which commit to create it at. The action
          # materializes the tag via the API (which does NOT re-fire
          # `push: tags`). On a tag push, target_commitish is ignored.
          tag_name: ${{ env.RELEASE_NAME }}
          name: ${{ env.RELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(env.RELEASE_NAME, '-') }}
          generate_release_notes: true
          body_path: release_body.md
          fail_on_unmatched_files: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote draft to published release
        # Identify the release by its tag name (env.RELEASE_NAME); on dispatch
        # GITHUB_REF_NAME is `main` and would not match.
        run: gh release edit "${RELEASE_NAME}" --draft=false --repo "${GITHUB_REPOSITORY}"
        env:
          RELEASE_NAME: ${{ env.RELEASE_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
